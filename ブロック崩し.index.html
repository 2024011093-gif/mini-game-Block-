<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>廃校ノ怪異 (LOST CLASSROOM) - ホラーブロック崩し</title>
    <!-- Tailwind CSS for UI overlays -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=New+Tegomin&display=swap');
        
        body {
            font-family: 'New Tegomin', serif;
            background-color: #030303;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameCanvas {
            display: block;
            background-color: #050505;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.4);
            border: 2px solid #5a0000;
            border-radius: 4px;
            max-width: 100%;
            max-height: 100vh;
        }

        /* おどろおどろしい赤光効果 */
        .horror-text-red {
            text-shadow: 0 0 10px #ff0000, 0 0 20px #8b0000;
        }

        .horror-text-ghost {
            text-shadow: 0 0 10px #70ffff, 0 0 20px #008b8b;
        }

        .horror-border {
            box-shadow: 0 0 25px rgba(139, 0, 0, 0.7), inset 0 0 20px rgba(0, 0, 0, 0.9);
            border: 2px solid #8b0000;
        }

        /* 激しいグリッチ風ノイズ */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-3px, 2px) }
            40% { transform: translate(3px, -2px) }
            60% { transform: translate(-3px, -2px) }
            80% { transform: translate(3px, 2px) }
            100% { transform: translate(0) }
        }
        .glitch-active {
            animation: glitch 0.15s infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- ゲーム画面コンテナ -->
    <div id="gameContainer" class="relative flex flex-col items-center justify-center w-full max-w-2xl px-4">
        
        <!-- ゲームキャンバス -->
        <canvas id="gameCanvas" width="600" height="750" class="mx-auto"></canvas>

        <!-- 呪われたスタート画面 -->
        <div id="startScreen" class="absolute inset-0 bg-black flex flex-col items-center justify-center text-red-600 p-6 rounded-lg horror-border m-4 z-10">
            <!-- お札風のシンボル -->
            <div class="border border-red-800 p-2 mb-4 bg-red-950/20 text-center select-none">
                <div class="text-xs tracking-widest text-red-500">急急如律令</div>
                <div class="text-2xl my-1 text-red-600">封</div>
                <div class="text-xs tracking-widest text-red-500">怨念退散</div>
            </div>
            
            <h1 class="text-4xl md:text-5xl font-bold text-center mb-1 tracking-widest text-red-600 horror-text-red">廃校ノ怪異</h1>
            <p class="text-gray-400 text-xs tracking-widest mb-8 text-center">古びた懐中電灯を手に、あの教室へ……</p>
            
            <div class="bg-red-950/40 p-4 rounded border border-red-900/50 w-full max-w-sm mb-8 text-xs text-gray-300 space-y-2">
                <div class="flex justify-between"><span>光源操作:</span> <span class="text-red-400">左右スワイプ / マウス</span></div>
                <div class="flex justify-between"><span>魂魄の射出:</span> <span class="text-cyan-400">画面タップ / クリック</span></div>
                <div class="flex justify-between"><span>消滅条件:</span> <span class="text-red-400 font-bold">蝋燭（命）の全消灯</span></div>
                <div class="border-t border-red-900/50 pt-2 text-center text-[10px] text-gray-400">
                    血塗られた「遺留品(アイテム)」を拾い、懐中電灯を強化せよ…
                </div>
            </div>

            <button id="startButton" class="px-8 py-3 bg-red-950/80 hover:bg-red-900 text-red-100 font-bold text-lg rounded border border-red-500 tracking-widest shadow-lg transform active:scale-95 transition-all duration-150">
                校舎へ入る (START)
            </button>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="gameOverScreen" class="absolute inset-0 bg-black hidden flex flex-col items-center justify-center text-red-600 p-6 rounded-lg horror-border m-4 z-10">
            <div class="text-5xl font-bold tracking-widest horror-text-red mb-2 text-center">帰ラレズ</div>
            <p class="text-gray-500 text-sm mb-8 text-center">あなたの存在は 廃校の怪異となった</p>
            <div class="text-center mb-8 space-y-1">
                <p class="text-xs text-gray-500">獲得した未練 (SCORE)</p>
                <p id="finalScore" class="text-4xl font-bold text-red-600">0</p>
                <p id="highScoreText" class="text-xs text-gray-400">最深記録: 0</p>
            </div>
            <button id="retryButton" class="px-8 py-3 bg-neutral-900 hover:bg-neutral-800 text-red-500 font-bold text-base rounded border border-red-800 tracking-widest transform active:scale-95 transition-all duration-150">
                もう一度、あの教室へ (RETRY)
            </button>
        </div>

        <!-- ゲームクリア画面 -->
        <div id="gameClearScreen" class="absolute inset-0 bg-black/95 hidden flex flex-col items-center justify-center text-cyan-500 p-6 rounded-lg horror-border m-4 z-10">
            <h2 class="text-4xl font-bold horror-text-ghost mb-2 tracking-widest text-center">除霊完了</h2>
            <p class="text-gray-400 text-sm mb-8 text-center">怪異は静まり、静寂が戻った……</p>
            <div class="text-center mb-8 space-y-1">
                <p class="text-xs text-gray-500">浄化スコア</p>
                <p id="clearScore" class="text-3xl font-bold text-cyan-400">0</p>
            </div>
            <button id="clearRetryButton" class="px-8 py-3 bg-neutral-900 hover:bg-neutral-800 text-cyan-400 font-bold text-base rounded border border-cyan-800 tracking-widest transform active:scale-95 transition-all duration-150">
                再び闇へ (RESTART)
            </button>
        </div>

        <!-- 下部コントロールパネル -->
        <div class="w-full flex justify-between items-center mt-2 px-2 text-xs text-red-700">
            <div>
                <span>最大怨念: </span><span id="headerHighScore" class="text-red-500 font-bold">0</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="muteButton" class="hover:text-red-500 transition-colors flex items-center gap-1">
                    <span id="muteIcon">🔊</span> <span id="muteText">SOUND ON</span>
                </button>
                <button id="pauseButton" class="hover:text-red-500 transition-colors">一時帰還 [P]</button>
            </div>
        </div>
    </div>

    <script>
        // --- Web Audio API (おどろおどろしい不協和音・呪いのSE) ---
        class HorrorSounds {
            constructor() {
                this.ctx = null;
                this.muted = false;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            playPaddleHit() {
                // ドンッという重い木造の床のような低音
                if (this.muted || !this.ctx) return;
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(120, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, this.ctx.currentTime + 0.15);
                
                gain.gain.setValueAtTime(0.25, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            }

            playBrickHit(isHard = false) {
                // 怨霊の悲鳴（高音の金属摩擦音）
                if (this.muted || !this.ctx) return;
                this.init();
                const osc = this.ctx.createOscillator();
                const osc2 = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(isHard ? 200 : 400, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(isHard ? 80 : 150, this.ctx.currentTime + 0.12);

                // 不協和音のための2つ目のオシレーター
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(isHard ? 213 : 426, this.ctx.currentTime);
                osc2.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 0.12);
                
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.005, this.ctx.currentTime + 0.12);
                
                osc.connect(gain);
                osc2.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc2.start();
                osc.stop(this.ctx.currentTime + 0.12);
                osc2.stop(this.ctx.currentTime + 0.12);
            }

            playItemCollect() {
                // 仏具のチーン（おりんの音）のような澄み切った、かつ不気味な高音
                if (this.muted || !this.ctx) return;
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(987.77, this.ctx.currentTime); // B5 (おりん調)
                osc.frequency.linearRampToValueAtTime(980, this.ctx.currentTime + 0.6);
                
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.6);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.6);
            }

            playLaserShoot() {
                // お札のシュパッという乾いた音
                if (this.muted || !this.ctx) return;
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.08);

                gain.gain.setValueAtTime(0.06, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.08);
            }

            playGameOver() {
                // 低く不気味な不協和音が奈落に沈んでいく
                if (this.muted || !this.ctx) return;
                this.init();
                const osc = this.ctx.createOscillator();
                const osc2 = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(20, this.ctx.currentTime + 1.2);

                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(103, this.ctx.currentTime);
                osc2.frequency.linearRampToValueAtTime(21, this.ctx.currentTime + 1.2);
                
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 1.2);
                
                osc.connect(gain);
                osc2.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc2.start();
                osc.stop(this.ctx.currentTime + 1.2);
                osc2.stop(this.ctx.currentTime + 1.2);
            }

            playLevelUp() {
                // 救済のチャイム（歪んだ学校のチャイム音風）
                if (this.muted || !this.ctx) return;
                this.init();
                const now = this.ctx.currentTime;
                // キーンコーンカーンコーンを不気味に
                const notes = [440, 349.23, 392, 261.63]; 
                notes.forEach((f, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now + i * 0.35);
                    gain.gain.setValueAtTime(0.08, now + i * 0.35);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.35 + 0.5);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + i * 0.35);
                    osc.stop(now + i * 0.35 + 0.5);
                });
            }
        }

        const sfx = new HorrorSounds();

        // --- キャンバス構成 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');

        // UI要素
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const retryButton = document.getElementById('retryButton');
        const gameClearScreen = document.getElementById('gameClearScreen');
        const clearRetryButton = document.getElementById('clearRetryButton');
        const finalScoreText = document.getElementById('finalScore');
        const clearScoreText = document.getElementById('clearScore');
        const headerHighScore = document.getElementById('headerHighScore');
        const highScoreText = document.getElementById('highScoreText');
        const muteButton = document.getElementById('muteButton');
        const muteIcon = document.getElementById('muteIcon');
        const muteText = document.getElementById('muteText');
        const pauseButton = document.getElementById('pauseButton');

        // ハイスコア
        let highScore = 0;
        try {
            highScore = parseInt(localStorage.getItem('lost_classroom_highscore') || '0', 10);
        } catch(e) {
            highScore = 0;
        }
        headerHighScore.textContent = highScore;

        // ゲームステート
        let score = 0;
        let lives = 3; // 蝋燭の数
        let level = 1;
        const maxLevels = 3;
        let isPlaying = false;
        let isPaused = false;
        let isBallLaunched = false;
        
        let shakeIntensity = 0;
        let horrorGlitchTimer = 0; // 画面崩壊ノイズ用

        // --- エンティティ定義 ---

        // 懐中電灯（パドル）
        const paddle = {
            x: canvas.width / 2 - 60,
            y: canvas.height - 65,
            width: 120,
            height: 12,
            laserActive: false,
            laserTimer: 0,
            laserCooldown: 0,
            wideTimer: 0,
            stickyActive: false
        };

        // 人魂（ボール）
        class GhostBall {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.speed = 7;
                this.vx = vx || 0;
                this.vy = vy || 0;
                this.trail = [];
                this.isStuck = false;
                this.stuckOffset = 0;
            }

            update() {
                if (this.isStuck) {
                    this.x = paddle.x + this.stuckOffset;
                    this.y = paddle.y - this.radius;
                    return;
                }

                // 怨念の尾（トレール）
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 10) {
                    this.trail.shift();
                }

                this.x += this.vx;
                this.y += this.vy;

                // 左右壁
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = -this.vx;
                    sfx.playPaddleHit();
                } else if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx = -this.vx;
                    sfx.playPaddleHit();
                }

                // 天井衝突
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy = -this.vy;
                    sfx.playPaddleHit();
                }
            }

            draw() {
                // 不気味な青白い人魂の尾
                this.trail.forEach((pos, idx) => {
                    const alpha = (idx + 1) / this.trail.length * 0.2;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, this.radius * (0.4 + (idx/this.trail.length)*0.6), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(112, 255, 255, ${alpha})`;
                    ctx.fill();
                });

                // コア（燃え盛る魂）
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffff';
                ctx.fill();
                
                // 冷たい瞳のような中心点
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#000000';
                ctx.fill();

                ctx.restore();
            }
        }

        let balls = [];

        // 怪異オブジェクト（ブロック）
        class SpecterBrick {
            constructor(x, y, width, height, type, hp) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.type = type; // 'wood' (血塗られた床板), 'doll' (日本人形), 'demon' (悪霊の顔)
                this.hp = hp;
                this.maxHp = hp;
                this.color = this.getColor();
            }

            getColor() {
                switch(this.type) {
                    case 'demon': return '#8b0000';    // 赤（最も凶悪な悪霊）
                    case 'doll': return '#a855f7';     // 紫（呪いの人形）
                    default: return '#3f3f3f';         // 暗灰色（木造校舎の廃材）
                }
            }

            damage() {
                this.hp--;
                sfx.playBrickHit(this.type === 'demon');
                shakeIntensity = Math.min(shakeIntensity + 8, 15); // 被弾時の強い衝撃
                
                // ダメージを受けると画面に恐怖ノイズが走る
                if (Math.random() < 0.6) {
                    horrorGlitchTimer = 8;
                }
                return this.hp <= 0;
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
                
                // 怨念の枠線
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1.5;
                ctx.strokeRect(this.x + 2, this.y + 2, this.width - 4, this.height - 4);
                
                // 生気の奪われた塗り
                ctx.fillStyle = this.color;
                ctx.globalAlpha = (this.hp / this.maxHp) * 0.4;
                ctx.fillRect(this.x + 3, this.y + 3, this.width - 6, this.height - 6);

                // 怪異のデザイン
                if (this.type === 'demon') {
                    ctx.fillStyle = '#ff0000';
                    ctx.globalAlpha = 0.8;
                    ctx.fillRect(this.x + this.width / 2 - 3, this.y + this.height / 2 - 2, 6, 4);
                } else if (this.type === 'doll') {
                    ctx.strokeStyle = '#000000';
                    ctx.globalAlpha = 0.7;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.width/2, this.y + 4);
                    ctx.lineTo(this.x + this.width/2, this.y + this.height - 4);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        let bricks = [];

        // 怨念の霧（パーティクル）
        class HorrorParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.radius = Math.random() * 3 + 1;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.015;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        let particles = [];

        // 廃校の遺留品（アイテム）
        class RelicItem {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.width = 16;
                this.height = 16;
                this.vy = 2.4;
                this.type = type; // 'battery', 'link', 'talisman', 'hair'
                this.color = this.getColor();
            }

            getColor() {
                switch(this.type) {
                    case 'battery': return '#00ffcc'; // 懐中電灯電池
                    case 'link': return '#ff0055';    // 血染めのハサミ
                    case 'talisman': return '#eab308';// お札
                    case 'hair': return '#7c3aed';    // 呪いの髪
                }
            }

            update() {
                this.y += this.vy;
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.lineTo(this.x, this.y + this.height);
                ctx.closePath();
                ctx.stroke();

                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + this.height/2 + 2, 2.5, 0, Math.PI*2);
                ctx.fill();

                ctx.restore();
            }
        }

        let items = [];

        // 呪符（レーザーショット）
        class TalismanCard {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 6;
                this.height = 18;
                this.vy = -11;
                this.color = '#ffaa00';
            }

            update() {
                this.y += this.vy;
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.width/2, this.y, this.width, this.height);
                
                ctx.fillStyle = '#000000';
                ctx.fillRect(this.x - 1, this.y + 3, 2, this.height - 6);
                ctx.restore();
            }
        }

        let lasers = [];

        // 闇に響く声（フローティングテキスト）
        class WhisperingVoice {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.alpha = 1;
                this.vy = -0.8;
                this.scale = 0.9 + Math.random() * 0.2;
            }
            update() {
                this.y += this.vy;
                this.alpha -= 0.02;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.font = `bold 12px "New Tegomin", serif`;
                ctx.fillStyle = this.color;
                ctx.textAlign = 'center';
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        let whispers = [];

        // --- ステージ生成 ---
        function createStage(lvl) {
            bricks = [];
            items = [];
            lasers = [];
            particles = [];
            whispers = [];

            const cols = 8;
            const brickWidth = canvas.width / cols;
            const brickHeight = 24;
            const topOffset = 90;

            let rows = 4 + lvl;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = c * brickWidth;
                    const y = r * brickHeight + topOffset;
                    
                    let type = 'wood';
                    let hp = 1;

                    if (lvl === 1) {
                        if (r % 2 === 1 && c % 3 === 0) {
                            type = 'doll';
                            hp = 2;
                        }
                    } else if (lvl === 2) {
                        if ((r + c) % 2 === 0) {
                            type = 'doll';
                            hp = 2;
                        }
                        if (r === 1 && (c === 3 || c === 4)) {
                            type = 'demon';
                            hp = 3;
                        }
                    } else { // Level 3
                        if (r % 2 === 0) {
                            type = 'doll';
                            hp = 2;
                        } else {
                            type = 'wood';
                        }
                        if (r === 0 && (c % 2 === 0)) {
                            type = 'demon';
                            hp = 4;
                        }
                    }

                    bricks.push(new SpecterBrick(x, y, brickWidth, brickHeight, type, hp));
                }
            }
        }

        // --- ゲーム開始 ---
        function initGame() {
            score = 0;
            lives = 3; 
            level = 1;
            isBallLaunched = false;
            isPlaying = true;
            isPaused = false;
            
            resetPaddle();
            resetBalls();
            createStage(level);
            
            hideOverlays();
        }

        function resetPaddle() {
            paddle.width = 120;
            paddle.x = canvas.width / 2 - paddle.width / 2;
            paddle.laserActive = false;
            paddle.laserTimer = 0;
            paddle.wideTimer = 0;
            paddle.stickyActive = false;
        }

        function resetBalls() {
            balls = [];
            const ball = new GhostBall(canvas.width / 2, paddle.y - 12, 0, 0);
            ball.isStuck = true;
            ball.stuckOffset = paddle.width / 2;
            balls.push(ball);
            isBallLaunched = false;
        }

        function launchBall() {
            if (isBallLaunched) return;
            
            balls.forEach(ball => {
                if (ball.isStuck) {
                    ball.isStuck = false;
                    const angle = -Math.PI / 3 - (Math.random() * Math.PI / 3);
                    ball.vx = ball.speed * Math.cos(angle);
                    ball.vy = ball.speed * Math.sin(angle);
                }
            });
            
            isBallLaunched = true;
        }

        // --- 遺留品適用 ---
        function triggerRelic(type, x, y) {
            sfx.playItemCollect();
            let voiceText = "";
            let color = "#ff0000";

            switch(type) {
                case 'battery':
                    paddle.width = 175;
                    paddle.wideTimer = 420;
                    voiceText = "光が、強くなった……";
                    color = "#00ffcc";
                    break;
                case 'link':
                    const currentBalls = [...balls];
                    currentBalls.forEach(b => {
                        const baseAngle = Math.atan2(b.vy, b.vx);
                        const spd = b.speed;
                        balls.push(new GhostBall(b.x, b.y, Math.cos(baseAngle + 0.3) * spd, Math.sin(baseAngle + 0.3) * spd));
                        balls.push(new GhostBall(b.x, b.y, Math.cos(baseAngle - 0.3) * spd, Math.sin(baseAngle - 0.3) * spd));
                    });
                    voiceText = "仲間を、増やして……";
                    color = "#ff0055";
                    break;
                case 'talisman':
                    paddle.laserActive = true;
                    paddle.laserTimer = 340;
                    paddle.laserCooldown = 0;
                    voiceText = "お札で退散させろ！";
                    color = "#eab308";
                    break;
                case 'hair':
                    paddle.stickyActive = true;
                    voiceText = "逃がさない……";
                    color = "#7c3aed";
                    break;
            }

            whispers.push(new WhisperingVoice(x, y, voiceText, color));
        }

        // --- フレーム更新 ---
        function update() {
            if (!isPlaying || isPaused) return;

            // パワーアップの効果時間
            if (paddle.wideTimer > 0) {
                paddle.wideTimer--;
                if (paddle.wideTimer <= 0) {
                    paddle.width = 120;
                }
            }

            if (paddle.laserActive) {
                paddle.laserTimer--;
                paddle.laserCooldown--;
                if (paddle.laserCooldown <= 0) {
                    lasers.push(new TalismanCard(paddle.x + 10, paddle.y));
                    lasers.push(new TalismanCard(paddle.x + paddle.width - 10, paddle.y));
                    sfx.playLaserShoot();
                    paddle.laserCooldown = 24;
                }
                if (paddle.laserTimer <= 0) {
                    paddle.laserActive = false;
                }
            }

            // 人魂の移動と衝突
            for (let i = balls.length - 1; i >= 0; i--) {
                const ball = balls[i];
                ball.update();

                // 底に落ちて消失
                if (ball.y - ball.radius > canvas.height) {
                    balls.splice(i, 1);
                    continue;
                }

                // パドルとの衝突
                if (!ball.isStuck && ball.vy > 0 &&
                    ball.x + ball.radius > paddle.x &&
                    ball.x - ball.radius < paddle.x + paddle.width &&
                    ball.y + ball.radius > paddle.y &&
                    ball.y - ball.radius < paddle.y + paddle.height) {
                    
                    const hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
                    
                    if (paddle.stickyActive) {
                        ball.isStuck = true;
                        ball.stuckOffset = ball.x - paddle.x;
                        isBallLaunched = false;
                        sfx.playPaddleHit();
                        continue;
                    }

                    const reflectAngle = hitPos * (Math.PI / 3);
                    ball.vx = ball.speed * Math.sin(reflectAngle);
                    ball.vy = -ball.speed * Math.cos(reflectAngle);
                    ball.y = paddle.y - ball.radius;
                    
                    sfx.playPaddleHit();
                }

                // 怪異との衝突
                for (let v = bricks.length - 1; v >= 0; v--) {
                    const brick = bricks[v];
                    
                    const nearestX = Math.max(brick.x, Math.min(ball.x, brick.x + brick.width));
                    const nearestY = Math.max(brick.y, Math.min(ball.y, brick.y + brick.height));
                    
                    const dx = ball.x - nearestX;
                    const dy = ball.y - nearestY;
                    const distSq = (dx * dx) + (dy * dy);

                    if (distSq < ball.radius * ball.radius) {
                        const isDestroyed = brick.damage();
                        
                        if (Math.abs(dx) > Math.abs(dy)) {
                            ball.vx = -ball.vx;
                        } else {
                            ball.vy = -ball.vy;
                        }

                        if (isDestroyed) {
                            spawnParticles(brick.x + brick.width/2, brick.y + brick.height/2, brick.color);
                            score += brick.maxHp * 13;
                            
                            const curseWords = ["タスケテ…", "クルシイ…", "アソボウ…", "ココニイルヨ…"];
                            const randomWord = curseWords[Math.floor(Math.random() * curseWords.length)];
                            whispers.push(new WhisperingVoice(brick.x + brick.width/2, brick.y + brick.height/2, randomWord, brick.color));

                            if (Math.random() < 0.16) {
                                const types = ['battery', 'link', 'talisman', 'hair'];
                                const selectedType = types[Math.floor(Math.random() * types.length)];
                                items.push(new RelicItem(brick.x + brick.width/2 - 8, brick.y + brick.height, selectedType));
                            }

                            bricks.splice(v, 1);
                        }
                        break;
                    }
                }
            }

            // すべての魂魄ロスト（ライフ減少）
            if (balls.length === 0) {
                lives--;
                shakeIntensity = 25;
                horrorGlitchTimer = 35;
                
                if (lives <= 0) {
                    doGameOver();
                } else {
                    resetPaddle();
                    resetBalls();
                }
            }

            // 呪符（レーザー）制御
            for (let l = lasers.length - 1; l >= 0; l--) {
                const laser = lasers[l];
                laser.update();

                if (laser.y < 0) {
                    lasers.splice(l, 1);
                    continue;
                }

                for (let v = bricks.length - 1; v >= 0; v--) {
                    const brick = bricks[v];
                    if (laser.x > brick.x && laser.x < brick.x + brick.width &&
                        laser.y < brick.y + brick.height && laser.y > brick.y) {
                        
                        const isDestroyed = brick.damage();
                        lasers.splice(l, 1);

                        if (isDestroyed) {
                            spawnParticles(brick.x + brick.width/2, brick.y + brick.height/2, brick.color);
                            score += brick.maxHp * 13;
                            whispers.push(new WhisperingVoice(brick.x + brick.width/2, brick.y + brick.height/2, "ギエェァァッ", brick.color));
                            bricks.splice(v, 1);
                        }
                        break;
                    }
                }
            }

            // 遺留品の移動と回収
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.update();

                if (item.y > canvas.height) {
                    items.splice(i, 1);
                    continue;
                }

                if (item.x + item.width > paddle.x &&
                    item.x < paddle.x + paddle.width &&
                    item.y + item.height > paddle.y &&
                    item.y < paddle.y + paddle.height) {
                    
                    triggerRelic(item.type, item.x + item.width/2, item.y);
                    items.splice(i, 1);
                }
            }

            // パーティクル更新
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            // 囁き声の更新
            for (let i = whispers.length - 1; i >= 0; i--) {
                const w = whispers[i];
                w.update();
                if (w.alpha <= 0) {
                    whispers.splice(i, 1);
                }
            }

            // グリッチタイマー減少
            if (horrorGlitchTimer > 0) {
                horrorGlitchTimer--;
                if (horrorGlitchTimer === 0) {
                    container.classList.remove('glitch-active');
                } else if (horrorGlitchTimer > 0) {
                    container.classList.add('glitch-active');
                }
            }

            // スクリーンシェイクの減衰
            if (shakeIntensity > 0) {
                shakeIntensity *= 0.85;
                if (shakeIntensity < 0.1) {
                    shakeIntensity = 0;
                }
            }

            // ステージクリア判定
            if (bricks.length === 0) {
                doLevelUp();
            }
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new HorrorParticle(x, y, Math.random() < 0.4 ? '#8b0000' : color));
            }
        }

        // --- 描画処理 ---
        function draw() {
            ctx.save();
            
            if (shakeIntensity > 0) {
                const dx = (Math.random() - 0.5) * shakeIntensity;
                const dy = (Math.random() - 0.5) * shakeIntensity;
                ctx.translate(dx, dy);
            }

            ctx.fillStyle = 'rgba(3, 3, 3, 0.45)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (horrorGlitchTimer > 15 && Math.random() < 0.3) {
                ctx.fillStyle = 'rgba(139, 0, 0, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            drawBackgroundScenery();

            bricks.forEach(brick => brick.draw());

            drawPaddleLight();

            balls.forEach(ball => ball.draw());

            items.forEach(item => item.draw());

            lasers.forEach(laser => laser.draw());

            particles.forEach(p => p.draw());

            whispers.forEach(w => w.draw());

            drawHUD();

            ctx.restore();
        }

        function drawBackgroundScenery() {
            ctx.save();
            ctx.strokeStyle = '#0a0a0a';
            ctx.lineWidth = 1;
            const size = 50;
            for (let x = 0; x < canvas.width; x += size) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            ctx.fillStyle = 'rgba(80, 0, 0, 0.12)';
            ctx.beginPath();
            ctx.arc(100, 200, 45, 0, Math.PI * 2);
            ctx.arc(480, 380, 60, 0, Math.PI * 2);
            ctx.arc(280, 600, 30, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawPaddleLight() {
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ffffcc';
            
            const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.width, paddle.y);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(0.2, 'rgba(255, 255, 220, 0.3)');
            grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.85)'); 
            grad.addColorStop(0.8, 'rgba(255, 255, 220, 0.3)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.fillStyle = grad;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(paddle.x + paddle.width/2 - 8, paddle.y + paddle.height, 16, 20);
            ctx.fillStyle = '#3a3a3a';
            ctx.fillRect(paddle.x + paddle.width/2 - 6, paddle.y + paddle.height + 2, 12, 4);

            if (paddle.stickyActive) {
                ctx.strokeStyle = '#2d1b4e';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(paddle.x, paddle.y);
                ctx.quadraticCurveTo(paddle.x + paddle.width/2, paddle.y - 10, paddle.x + paddle.width, paddle.y);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawHUD() {
            ctx.save();
            
            ctx.strokeStyle = 'rgba(139, 0, 0, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, 55);
            ctx.lineTo(canvas.width, 55);
            ctx.stroke();

            ctx.fillStyle = '#8b0000';
            ctx.font = 'bold 15px "New Tegomin", serif';
            ctx.fillText(`獲得シタ未練: ${score}`, 20, 34);

            ctx.textAlign = 'center';
            ctx.fillStyle = '#808080';
            ctx.fillText(`第 ${level} 教室`, canvas.width / 2, 34);

            ctx.textAlign = 'right';
            let candleStr = "";
            for (let l = 0; l < 3; l++) {
                if (l < lives) {
                    candleStr += "🕯️"; 
                } else {
                    candleStr += "💨"; 
                }
            }
            ctx.fillStyle = '#ffaa00';
            ctx.fillText(`正気度: ${candleStr}`, canvas.width - 20, 34);

            let timerOffset = 75;
            if (paddle.wideTimer > 0) {
                ctx.fillStyle = '#00ffcc';
                ctx.font = '11px "New Tegomin", serif';
                ctx.textAlign = 'left';
                ctx.fillText(`光源拡張: ${Math.ceil(paddle.wideTimer/60)}秒`, 20, timerOffset);
                timerOffset += 18;
            }
            if (paddle.laserActive) {
                ctx.fillStyle = '#eab308';
                ctx.font = '11px "New Tegomin", serif';
                ctx.textAlign = 'left';
                ctx.fillText(`除霊のお札: ${Math.ceil(paddle.laserTimer/60)}秒`, 20, timerOffset);
            }

            ctx.restore();
        }

        // --- メインループ ---
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function doLevelUp() {
            sfx.playLevelUp();
            level++;
            if (level > maxLevels) {
                doGameClear();
            } else {
                createStage(level);
                resetPaddle();
                resetBalls();
            }
        }

        function doGameClear() {
            isPlaying = false;
            gameClearScreen.classList.remove('hidden');
            clearScoreText.textContent = `${score}`;
            checkHighScore();
        }

        function doGameOver() {
            isPlaying = false;
            sfx.playGameOver();
            gameOverScreen.classList.remove('hidden');
            finalScoreText.textContent = `${score}`;
            checkHighScore();
        }

        function checkHighScore() {
            if (score > highScore) {
                highScore = score;
                try {
                    localStorage.setItem('lost_classroom_highscore', highScore);
                } catch(e) {}
                headerHighScore.textContent = highScore;
                highScoreText.textContent = `最大怨念更新: ${highScore}`;
            } else {
                highScoreText.textContent = `最深記録: ${highScore}`;
            }
        }

        function hideOverlays() {
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameClearScreen.classList.add('hidden');
        }

        // --- 入力イベント ---
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const mouseX = (e.clientX - rect.left) * scaleX;
            
            paddle.x = mouseX - paddle.width / 2;

            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const touchX = (e.touches[0].clientX - rect.left) * scaleX;

                paddle.x = touchX - paddle.width / 2;

                if (paddle.x < 0) paddle.x = 0;
                if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
            }
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('mousedown', () => {
            sfx.init();
            if (isPlaying && !isBallLaunched) {
                launchBall();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            sfx.init();
            if (isPlaying && !isBallLaunched) {
                launchBall();
            }
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                togglePause();
            }
            if (e.key === ' ' || e.key === 'ArrowUp') {
                if (isPlaying && !isBallLaunched) {
                    launchBall();
                }
            }
        });

        startButton.addEventListener('click', () => {
            sfx.init();
            initGame();
        });

        retryButton.addEventListener('click', () => {
            sfx.init();
            initGame();
        });

        clearRetryButton.addEventListener('click', () => {
            sfx.init();
            initGame();
        });

        function togglePause() {
            if (!isPlaying) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseButton.textContent = '探索再開 [P]';
                pauseButton.classList.add('text-red-500');
            } else {
                pauseButton.textContent = '一時帰還 [P]';
                pauseButton.classList.remove('text-red-500');
            }
        }
        pauseButton.addEventListener('click', togglePause);

        muteButton.addEventListener('click', () => {
            sfx.muted = !sfx.muted;
            if (sfx.muted) {
                muteIcon.textContent = '🔇';
                muteText.textContent = 'SOUND OFF';
            } else {
                muteIcon.textContent = '🔊';
                muteText.textContent = 'SOUND ON';
            }
        });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
